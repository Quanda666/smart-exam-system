server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: smart-exam-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/smart_exam_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    hikari:
      pool-name: smart-exam-hikari
      minimum-idle: 1
      maximum-pool-size: 5
      connection-timeout: 3000

app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
  ai:
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    mock-enabled: ${AI_MOCK_ENABLED:true}
    timeout-seconds: ${AI_TIMEOUT_SECONDS:30}
