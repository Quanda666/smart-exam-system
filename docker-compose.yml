services:
  mysql:
    image: mysql:8.4
    container_name: smart-exam-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smart_exam_system
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - smart-exam-mysql-data:/var/lib/mysql
      - ./backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/src/main/resources/db/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
    container_name: smart-exam-backend
    environment:
      PORT: 8080
      MYSQL_URL: jdbc:mysql://mysql:3306/smart_exam_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: root
      AI_MOCK_ENABLED: true
      OPENAI_MODEL: gpt-4o-mini
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
  frontend:
    build:
      context: ./frontend
    container_name: smart-exam-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  smart-exam-mysql-data:
