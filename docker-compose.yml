# Docker Compose for Smart Exam System Local Development
# This configuration is optimized for local testing with all services containerized

version: '3.9'

services:
  # MySQL Database Service
  mysql:
    image: mysql:8.4
    container_name: smart-exam-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-smart_exam_system}
      MYSQL_USER: ${MYSQL_USER:-smartexam}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-smartexam123}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=caching_sha2_password
      - --max-connections=200
      - --innodb-buffer-pool-size=256M
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/src/main/resources/db/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u${MYSQL_USER:-smartexam}", "-p${MYSQL_PASSWORD:-smartexam123}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - smart-exam-network

  # Backend Service (Spring Boot)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-exam-backend
    restart: unless-stopped
    environment:
      # Server Configuration
      PORT: ${SERVER_PORT:-8080}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      
      # Database Configuration
      MYSQL_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-smart_exam_system}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      MYSQL_USERNAME: ${MYSQL_USER:-smartexam}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-smartexam123}
      
      # CORS Configuration
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*}
      
      # AI Configuration
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AI_MOCK_ENABLED: ${AI_MOCK_ENABLED:-true}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-30}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - smart-exam-network

  # Frontend Service (Nginx serving Vue.js SPA)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-exam-frontend
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - smart-exam-network

# Volumes for persistent data
volumes:
  mysql-data:
    name: smart-exam-mysql-data
    driver: local

# Network configuration
networks:
  smart-exam-network:
    name: smart-exam-network
    driver: bridge
